on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  analisis-estatico:
    name: "1. Análisis Estático - TFLint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Crear configuración de TFLint
        run: |
          cat > .tflint.hcl << 'TFLINT'
          config {
            module = true
            force = false
          }
          plugin "aws" {
            enabled = true
            version = "0.40"
            source  = "github.com/terraform-linters/tflint-ruleset-aws"
          }
          rule "aws_instance_invalid_type" {
            enabled = false
          }
          rule "aws_instance_previous_type" {
            enabled = false
          }
          TFLINT

      - name: Instalar TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Inicializar TFLint
        run: tflint --init
        working-directory: infra-principal-auy1105-grupo-1

      - name: Ejecutar TFLint
        run: tflint --format compact
        working-directory: infra-principal-auy1105-grupo-1

  analisis-seguridad:
    name: "2. Análisis de Seguridad - Checkov"
    runs-on: ubuntu-latest
    needs: analisis-estatico
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Ejecutar Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra-principal-auy1105-grupo-1
          framework: terraform
          soft_fail: true

  validacion-terraform:
    name: "3. Validación Terraform"
    runs-on: ubuntu-latest
    needs: analisis-seguridad
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: infra-principal-auy1105-grupo-1

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra-principal-auy1105-grupo-1
